<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --accent-1: #1e40af;
      --accent-2: #3b82f6;
      --accent-3: #60a5fa;
      --text: #f0f4ff;
      --glass: rgba(59, 130, 246, 0.06);
      --border: rgba(59, 130, 246, 0.2);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Vazirmatn', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--bg);
      overflow: hidden;
    }

    .bg::before {
      content: '';
      position: absolute;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      background:
        radial-gradient(ellipse 60% 50% at 20% 40%, rgba(30, 64, 175, 0.4) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 20%, rgba(59, 130, 246, 0.3) 0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 60% 80%, rgba(37, 99, 235, 0.2) 0%, transparent 50%);
      animation: meshMove 12s ease-in-out infinite alternate;
    }

    @keyframes meshMove {
      0%   { transform: translate(0, 0) rotate(0deg) scale(1); }
      33%  { transform: translate(3%, -2%) rotate(2deg) scale(1.05); }
      66%  { transform: translate(-2%, 3%) rotate(-1deg) scale(0.98); }
      100% { transform: translate(2%, 1%) rotate(1deg) scale(1.02); }
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
      z-index: 1;
      pointer-events: none;
      animation: orbFloat var(--dur) ease-in-out infinite alternate;
    }

    .orb-1 { width: 300px; height: 300px; background: var(--accent-1); top: 10%; left: 5%; --dur: 8s; }
    .orb-2 { width: 250px; height: 250px; background: var(--accent-2); bottom: 15%; right: 8%; --dur: 10s; animation-delay: -3s; }
    .orb-3 { width: 180px; height: 180px; background: var(--accent-3); top: 50%; left: 50%; transform: translate(-50%, -50%); --dur: 7s; animation-delay: -5s; }

    @keyframes orbFloat {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -40px) scale(1.15); }
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem;
      text-align: center;
    }

    .heading {
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      text-transform: uppercase;
      min-height: 1.1em;
      white-space: nowrap;
    }

    .typewriter {
      display: inline-flex;
      align-items: baseline;
      white-space: nowrap;
    }

    .type-text {
      color: var(--text);
    }

    .type-text.shimmer {
      background: linear-gradient(
        90deg,
        var(--text) 0%,
        var(--accent-3) 40%,
        var(--accent-2) 60%,
        var(--text) 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 5s linear infinite;
    }

    .type-cursor {
      color: var(--accent-2);
      font-weight: 400;
      margin-left: 0.08em;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .telegram {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: #60a5fa;
      text-decoration: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(20px);
      transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease, opacity 0.6s ease;
    }

    .telegram.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .telegram svg {
      width: 26px;
      height: 26px;
      fill: currentColor;
    }

    .telegram:hover {
      transform: translateY(-4px) scale(1.05);
      border-color: rgba(59, 130, 246, 0.5);
      background: rgba(59, 130, 246, 0.12);
      box-shadow: 0 12px 30px rgba(59, 130, 246, 0.25);
    }

    .cursor-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 2;
      transform: translate(-50%, -50%);
      transition: left 0.1s ease, top 0.1s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <canvas id="particles"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="container">
    <h1 class="heading">
      <span class="typewriter">
        <span class="type-text" id="typeText"></span><span class="type-cursor" id="typeCursor">|</span>
      </span>
    </h1>

    <a
      class="telegram"
      id="telegramBtn"
      href="https://t.me/aalicombot"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Telegram"
      title="Telegram"
    >
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
      </svg>
    </a>
  </div>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
        this.opacity = Math.random() * 0.5 + 0.1;
        const colors = ['#1e40af', '#2563eb', '#3b82f6', '#60a5fa'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.opacity;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function initParticles() {
      particles = Array.from({ length: 80 }, () => new Particle());
    }

    function connectParticles() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(59, 130, 246, ${0.08 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      connectParticles();
      requestAnimationFrame(animateParticles);
    }

    resizeCanvas();
    initParticles();
    animateParticles();
    window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

    const glow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });

    // ── Typewriter ──
    const phrase = 'Coming Soon';
    const typeEl = document.getElementById('typeText');
    const telegramBtn = document.getElementById('telegramBtn');
    let charIndex = 0;
    let isDeleting = false;
    let typedOnce = false;

    function typeWriter() {
      if (!isDeleting) {
        typeEl.textContent = phrase.slice(0, charIndex + 1);
        charIndex++;

        if (charIndex === phrase.length) {
          typeEl.classList.add('shimmer');
          if (!typedOnce) {
            typedOnce = true;
            telegramBtn.classList.add('visible');
          }
          setTimeout(() => { isDeleting = true; typeWriter(); }, 2500);
          return;
        }
        setTimeout(typeWriter, 90);
      } else {
        typeEl.classList.remove('shimmer');
        typeEl.textContent = phrase.slice(0, charIndex - 1);
        charIndex--;

        if (charIndex === 0) {
          isDeleting = false;
          setTimeout(typeWriter, 600);
          return;
        }
        setTimeout(typeWriter, 45);
      }
    }

    typeWriter();
  </script>
</body>
</html>
